<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cierra Lilliech E-Portfolio</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="https://kit.fontawesome.com/ab36a8e828.js" crossorigin="anonymous"></script>
</head>
<body>
    <section id="about-me">
        <nav>
            <div class="personal__logo">Cierra Lilliech</div>
            <ul class="nav__link--list">
                <li>
                    <a href="" class=" nav__link--anchor
                    link__hover-effect"
                    link__hover-effect--black">
                    Languages</a>
                </li>
                <li>
                    <a href="" class=" nav__link--anchor
                    link__hover-effect"
                    link__hover-effect--black">
                    Projects</a>
                </li>
                <li>
                    <a href="" class=" nav__link--anchor
                    nav__link--anchor-primary">
                    Contact</a>
                </li>
            </ul>
        </nav>
<div class="flex flex-1">
    <div class="about-me__info row">
        <div class="about-me__info--container">
            <figure class="about-me__picture--mask">
                <img src="./me.jpeg.JPG" class="about-me__picture" alt="Picture of Me">
            </figure>
                <h1 class="about-me__info--title">
                Hey! I'm <span class="text--purple">Cierra Lilliech</span>👋
                </h1>
                <p class="about-me__info--para">
                I'm a <strong class="text--purple">Front-End Developer</strong> 
                </p>>
                <div class="about-me__links">
                    <a href="" class="about-me__link">
                        <i class="fa-brands fa-linkedin about-me__link--icon"></i>
                    </a>
                    <a href="" class="about-me__link">
                        <i class="fa-brands fa-github"></i>
                    </a>
                    <a href="" class="about-me__link">
                        <i class="fa-regular fa-envelope"></i>
                    <a href="" class="about-me__link">
                        <i class="fa-regular fa-file"></i>
                    </a>
                </div>
            </div>
                <figure class="about-me__img--container">
                    <img src="./assets/undraw_proud-designer_1rcm.svg" class="about-me__img" alt="Proud Designer">
                </figure>        
            </div>
    </section>
    <section id="languages">
        <div class="container">
            <div class="row">
                <h1 class="section__title">This is my technology stack. </h1>
                <div class="language__list">
                    <div class="language">
                    <figure class="language__img--wrapper">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/3/38/HTML5_Badge.svg" class="language__img" alt="HTML">
                    </figure>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
